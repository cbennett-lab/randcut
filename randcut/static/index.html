<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOW Moments</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #080808;
    --surface: #101010;
    --border: #1e1e1e;
    --accent: #ff3c00;
    --text: #efefef;
    --muted: #444;
    --green: #00ff88;
    --btn-inactive: #141414;
    --btn-inactive-border: #2a2a2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none; z-index: 100;
  }

  .bracket { position: fixed; width: 40px; height: 40px; border-color: var(--border); border-style: solid; opacity: 0.4; }
  .bracket.tl { top: 20px; left: 20px; border-width: 1px 0 0 1px; }
  .bracket.tr { top: 20px; right: 20px; border-width: 1px 1px 0 0; }
  .bracket.bl { bottom: 20px; left: 20px; border-width: 0 0 1px 1px; }
  .bracket.br { bottom: 20px; right: 20px; border-width: 0 1px 1px 0; }

  .wrapper {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 14vw, 100px);
    letter-spacing: 4px;
    line-height: 0.9;
  }

  .title span { color: var(--accent); }

  .subtitle {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 12px;
  }

  .categories-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    align-self: flex-start;
  }

  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    width: 100%;
    margin-bottom: 24px;
  }

  .cat-btn {
    flex: 1;
    min-width: 180px;
    background: var(--btn-inactive);
    border: 1px solid var(--btn-inactive-border);
    color: var(--muted);
    padding: 18px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }

  .cat-btn:hover { border-color: var(--accent); color: var(--text); }
  .cat-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

  .generate-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 26px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    letter-spacing: 6px;
    cursor: pointer;
    transition: all 0.15s;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  }

  .generate-btn:hover { background: #ff5520; transform: translateY(-2px); box-shadow: 0 8px 40px rgba(255,60,0,0.2); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { background: #1e1e1e; color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

  .status-panel {
    width: 100%;
    margin-top: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    padding: 20px 24px;
    display: none;
  }
  .status-panel.visible { display: block; }

  .status-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0; transition: background 0.3s;
  }
  .status-dot.working { background: var(--accent); animation: pulse 1s infinite; }
  .status-dot.done { background: var(--green); animation: none; }
  .status-dot.error { background: #ff3333; animation: none; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .status-msg { font-size: 12px; color: var(--muted); line-height: 1.5; }

  .clips-used { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; }
  .clips-used.visible { display: block; }
  .clips-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .clip-tag {
    display: inline-block; font-size: 10px;
    background: #151515; border: 1px solid var(--border);
    padding: 3px 8px; margin: 2px 3px 2px 0; color: var(--text);
    max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .download-btn {
    display: none;
    width: 100%;
    margin-top: 2px;
    background: none;
    border: 1px solid var(--green);
    color: var(--green);
    padding: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 5px;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    transition: all 0.15s;
  }
  .download-btn:hover { background: rgba(0,255,136,0.05); box-shadow: 0 0 30px rgba(0,255,136,0.1); }
  .download-btn.visible { display: block; }

  .counter {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px; color: var(--border);
    letter-spacing: 4px; text-align: center;
    margin-top: 24px; transition: color 0.3s;
  }
  .counter.active { color: var(--accent); }

  .footer {
    margin-top: 40px; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); text-align: center; line-height: 2;
  }

  .no-selection-msg {
    font-size: 11px; color: var(--accent);
    text-align: center; margin-bottom: 10px;
    display: none; letter-spacing: 1px;
  }
  .no-selection-msg.visible { display: block; }
</style>
</head>
<body>

<div class="bracket tl"></div>
<div class="bracket tr"></div>
<div class="bracket bl"></div>
<div class="bracket br"></div>

<div class="wrapper">

  <div class="header">
    <div class="title">WOW<span>MOMENTS</span></div>
    <div class="subtitle">Select a category · Generate your highlight reel</div>
  </div>

  <div class="categories-label">Choose your moment</div>
  <div class="categories" id="categories"></div>

  <div class="no-selection-msg" id="noSelectionMsg">← Select a category first</div>

  <button class="generate-btn" id="generateBtn" onclick="generate()">GENERATE</button>

  <div class="status-panel" id="statusPanel">
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-msg" id="statusMsg">Starting...</div>
    </div>
    <div class="clips-used" id="clipsUsed">
      <div class="clips-label">Clips selected</div>
      <div id="clipTags"></div>
    </div>
  </div>

  <a class="download-btn" id="downloadBtn" href="#" download>↓ DOWNLOAD VIDEO</a>

  <div class="counter" id="counter">00</div>

  <div class="footer">Each press picks a new random combination</div>

</div>

<script>
  let selectedCategory = null;
  let generateCount = 0;
  let pollInterval = null;

  async function loadCategories() {
    const res = await fetch('/categories');
    const cats = await res.json();
    const container = document.getElementById('categories');
    container.innerHTML = '';
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.textContent = cat.label;
      btn.dataset.key = cat.key;
      btn.onclick = () => selectCategory(cat.key, btn);
      container.appendChild(btn);
    });
  }

  function selectCategory(key, btn) {
    selectedCategory = key;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('noSelectionMsg').classList.remove('visible');
  }

  async function generate() {
    if (!selectedCategory) {
      document.getElementById('noSelectionMsg').classList.add('visible');
      return;
    }

    const btn = document.getElementById('generateBtn');
    const panel = document.getElementById('statusPanel');
    const dot = document.getElementById('statusDot');
    const msg = document.getElementById('statusMsg');
    const dlBtn = document.getElementById('downloadBtn');
    const clipsUsed = document.getElementById('clipsUsed');
    const clipTags = document.getElementById('clipTags');
    const counter = document.getElementById('counter');

    btn.disabled = true;
    dlBtn.classList.remove('visible');
    clipsUsed.classList.remove('visible');
    clipTags.innerHTML = '';
    panel.classList.add('visible');
    dot.className = 'status-dot working';
    msg.textContent = 'Connecting to Google Drive...';

    if (pollInterval) clearInterval(pollInterval);

    try {
      const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category: selectedCategory })
      });
      const { job_id } = await res.json();

      pollInterval = setInterval(async () => {
        const s = await fetch(`/status/${job_id}`).then(r => r.json());
        msg.textContent = s.message || '...';

        if (s.clips_used && s.clips_used.length) {
          clipsUsed.classList.add('visible');
          clipTags.innerHTML = s.clips_used.map(n => `<span class="clip-tag">${n}</span>`).join('');
        }

        if (s.status === 'done') {
          clearInterval(pollInterval);
          dot.className = 'status-dot done';
          btn.disabled = false;
          generateCount++;
          counter.textContent = String(generateCount).padStart(2, '0');
          counter.classList.add('active');
          dlBtn.href = `/download/${s.file}`;
          dlBtn.setAttribute('download', `wowmoment_${generateCount}.mp4`);
          dlBtn.classList.add('visible');
        } else if (s.status === 'error') {
          clearInterval(pollInterval);
          dot.className = 'status-dot error';
          btn.disabled = false;
        }
      }, 1500);

    } catch (e) {
      msg.textContent = 'Network error: ' + e.message;
      dot.className = 'status-dot error';
      btn.disabled = false;
    }
  }

  loadCategories();
</script>

</body>
</html>
